storage_config_generation: 0
static_erasure: none

host_configs:
- drive:
  - path: /dev/disk/by-partlabel/ydb_data_1
    type: SSD
  host_config_id: 1

hosts:
- node_id: 1
  host_config_id: 1
  host: ydb-1c.ru-central1.internal
  walle_location:
    body: 1
    data_center: 'dc'
    rack: '1'

domains_config:
  domain:
  - domain_id: 1
    name: local
    scheme_root: 72075186232723360
    storage_pool_types:
    - kind: ssd
      pool_config:
        box_id: 1
        erasure_species: none
        kind: ssd
        pdisk_filter:
        - property:
          - type: SSD
        vdisk_kind: Default
  state_storage:
  - ring:
      node: [1]
      nto_select: 1
      use_ring_specific_node_selection: true
    ssid: 1
  security_config:
    default_users:
    - name: root
      password: "1234"
    - name: ydbuser
      password: "1234"

table_profiles_config:
  table_profiles:
  - name: default
    compaction_policy: default
    execution_policy: default
    partitioning_policy: default
    storage_policy: default
    replication_policy: default
    caching_policy: default
  compaction_policies:
  - name: default
  execution_policies:
  - name: default
  partitioning_policies:
  - name: default
    auto_split: true
    auto_merge: true
    size_to_split: 2147483648
  storage_policies:
  - name: default
    column_families:
    - storage_config:
        sys_log:
          preferred_pool_kind: ssd
        log:
          preferred_pool_kind: ssd
        data:
          preferred_pool_kind: ssd
  replication_policies:
  - name: default
  caching_policies:
  - name: default

blob_storage_config:
  service_set:
    availability_domains: 1
    groups:
    - erasure_species: none
      group_generation: 1
      group_id: 0
      rings:
      - fail_domains:
        - vdisk_locations:
          - node_id: 1
            pdisk_category: SSD
            path: /dev/disk/by-partlabel/ydb_data_1

channel_profile_config:
  profile:
  - channel:
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    profile_id: 0
  - channel:
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    - erasure_species: none
      pdisk_category: 1
      storage_pool_kind: ssd
    profile_id: 1

system_tablets:
  default_node:
  - 1
  flat_schemeshard:
  - info:
      tablet_id: 72075186232723360
  flat_tx_coordinator:
  - node:
    - 1
  tx_allocator:
  - node:
    - 1
  tx_mediator:
  - node:
    - 1

interconnect_config:
  start_tcp: true
  encryption_mode: DISABLED

grpc_config:
  services_enabled:
  - legacy
  - discovery
  - kesus

feature_flags:
  enable_drain_on_shutdown: false
  enable_public_api_external_blobs: false
  enable_external_data_sources: false
  enable_scheme_transactions_at_scheme_shard: true
  enable_mvcc_snapshot_reads: true
  enable_script_execution_operations: true
  enable_parameterized_decimal: true
  enable_table_datetime64: true
  enable_vector_index: true
  enable_column_statistics: true

table_service_config:
  sql_version: 1
  enable_batch_updates: true
  enable_oltp_sink: true
  allow_olap_data_query: true
  enable_olap_sink: true
  enable_create_table_as: true

column_shard_config:
  disabled_on_scheme_shard: false

pqcluster_discovery_config:
  enabled: false

tracing_config:
  backend:
    opentelemetry:
      collector_url: grpc://monit1:4317
      service_name: ydb-pgdata
  external_throttling:
    - max_traces_per_minute: 180

actor_system_config:
  use_auto_config: true
  node_type: COMPUTE
  cpu_count: 16

memory_controller_config:
  hard_limit_bytes: 80530636800
  shared_cache_min_percent: 25
  shared_cache_max_percent: 50
  query_execution_limit_percent: 30
